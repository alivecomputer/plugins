<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* GitHub social preview: 1280x640 */
  body { margin: 0; padding: 0; background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .card {
    width: 1280px; height: 640px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
  }
  /* Subtle grid background */
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(200,117,51,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,117,51,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .squirrel { font-size: 64px; margin-bottom: 24px; position: relative; }
  h1 {
    font-size: 56px; font-weight: 700; color: #f0f0f0;
    margin: 0 0 16px; letter-spacing: -1px; position: relative;
  }
  .sub {
    font-size: 22px; color: #888; margin: 0; position: relative;
    letter-spacing: 0.5px;
  }
  .install {
    margin-top: 40px; position: relative;
    background: #141414; border: 1px solid #2a2a2a;
    border-radius: 8px; padding: 14px 28px;
    font-family: 'JetBrains Mono', monospace; font-size: 18px;
    color: #c87533;
  }
  .brand {
    position: absolute; bottom: 32px; right: 40px;
    font-size: 16px; color: #444; letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <div class="squirrel">&#x1F43F;&#xFE0F;</div>
  <h1>The context layer your AI is missing.</h1>
  <p class="sub">One install for Claude Code. Plain files on your machine. Every session compounds.</p>
  <div class="install">claude plugin install alive@alivecomputer</div>
  <div class="brand">Alive Computer</div>
</div>
</body>
</html>
